<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="description" content="RecycleHub - Smart Bottle Recycling System" />
    <title>RecycleHub</title>
    
    <!-- Complete React DevTools Blocker - LAYER 1 (Inline) -->
    <script>
      (function() {
        'use strict';
        
        // Create a complete no-op hook that satisfies all DevTools requirements
        var noop = function() {};
        var noopReturnsFalse = function() { return false; };
        var noopReturnsNull = function() { return null; };
        
        // Complete DevTools hook implementation
        var devtoolsHook = {
          // Core properties
          isDisabled: true,
          supportsFiber: true,
          renderers: new Map(),
          
          // Injection methods - CRITICAL for Figma Make
          inject: noop,
          injectIntoGlobalHook: noop,  // ← This is the missing function!
          injectIntoDevTools: noop,
          
          // Fiber methods
          onCommitFiberRoot: noop,
          onPostCommitFiberRoot: noop,
          onCommitFiberUnmount: noop,
          onScheduleFiberRoot: noop,
          
          // Additional methods
          checkDCE: noop,
          getFiberRoots: function() { return new Map(); },
          resolveRendererId: noopReturnsNull,
          
          // Settings
          _renderers: new Map(),
          _fiberRoots: new Map(),
          
          // Helper methods
          sub: noop,
          on: noop,
          off: noop,
          emit: noop,
          
          // Profiler methods
          getTimelineData: noopReturnsNull,
          toggleProfilingStatus: noop,
          profilingHook: noop,
          
          // Compatibility
          helpers: {},
          backends: new Map(),
          hasUnsupportedRendererAttached: false,
          supportsProfiling: noopReturnsFalse,
        };
        
        // Lock the hook to prevent overwriting
        try {
          Object.defineProperty(window, '__REACT_DEVTOOLS_GLOBAL_HOOK__', {
            configurable: false,
            enumerable: false,
            writable: false,
            value: devtoolsHook
          });
        } catch (e) {
          // Fallback if defineProperty fails
          try {
            window.__REACT_DEVTOOLS_GLOBAL_HOOK__ = devtoolsHook;
          } catch (e2) {
            // Read-only environment like Figma
          }
        }
        
        // Also prevent the hook from being overwritten
        try {
          Object.freeze(devtoolsHook);
        } catch (e) {
          // Ignore freeze errors
        }
        
        console.log('[RecycleHub] React DevTools disabled for Figma Make environment ✅');
      })();
    </script>
    
    <!-- Complete React DevTools Blocker - LAYER 2 (External) -->
    <script src="/devtools-blocker.js"></script>
    
    <!-- Leaflet CSS loaded via imports in React components -->
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
